apiVersion: apps/v1
kind: Deployment
metadata:
  name: aers-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aers-backend
  template:
    metadata:
      labels:
        app: aers-backend
    spec:
      containers:
      - name: backend
        image: priyobrotokarmakar/alert-escalation-resolution-system-backend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"