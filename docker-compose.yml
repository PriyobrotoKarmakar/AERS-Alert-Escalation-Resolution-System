services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alert-escalation-resolution-system-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aers-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alert-escalation-resolution-system-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aers-network

networks:
  aers-network:
    driver: bridge
